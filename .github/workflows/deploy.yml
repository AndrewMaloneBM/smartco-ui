name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Allow one concurrent deploy; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static export
        run: npm run build
        env:
          GITHUB_PAGES: "true"
      # gh-pages branch deploys skip Jekyll, but Next emits a _next dir — keep .nojekyll as a guard.
      - run: touch out/.nojekyll
      # Pushes the build straight to the gh-pages branch (Pages source: "Deploy from branch").
      # Switched from the Actions/Pages-artifact integration after it got stuck indefinitely
      # in "deployment_queued" on GitHub's side across multiple unrelated commits.
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
